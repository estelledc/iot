acceptance_checks:
  - id: active_goal_contract
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_active_goal.py
    expectation: ACTIVE_GOAL_OK goal_id=IOT-T063 during the slice and status=COMPLETE at closeout.
  - id: workflow_policy_tests
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python -m unittest tests.test_repository_policies.WorkflowPolicyTests -v
    expectation: active-goal workflow mutation tests reject every specified bypass and both repository workflows pass.
  - id: workflow_policy
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_workflow_policy.py
    expectation: both workflows expose an exact, ordered, fail-closed active-goal check.
  - id: inventory_catalog
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/content_inventory.py --check && .tmp/agent-venv/bin/python tools/generate_layer_catalogs.py --check
    expectation: canonical_content=697, plan_topics=1761 and all generated catalogs remain current.
  - id: frontmatter
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_frontmatter.py --schema-only --fixtures && .tmp/agent-venv/bin/python tools/validate_frontmatter.py --all
    expectation: fixture schema and all canonical frontmatter remain valid and unchanged.
  - id: source_records
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_source_audits.py --all
    expectation: SOURCE_AUDITS_OK checked=1287.
  - id: review_records
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_review_records.py --all
    expectation: REVIEW_RECORDS_OK checked=1284.
  - id: trust_projection
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_trust_state.py --all --baseline-mode
    expectation: source_records=1287 review_records=1284 verified=642 approved=642.
  - id: full_tests
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python -m unittest discover -s tests -v
    expectation: the full repository suite passes.
  - id: markdown
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python tools/check_markdown_fences.py --all && .tmp/agent-venv/bin/python tools/check_markdown_links.py --all --anchors --strict
    expectation: Markdown fence, link and anchor checks pass.
  - id: strict_build
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python -m mkdocs build --strict --site-dir .tmp/site-agent-t063
    expectation: strict site build succeeds without changing tracked output.
  - id: diff_check
    cadence: EVERY_SLICE
    command: git diff --check
    expectation: no whitespace errors.
