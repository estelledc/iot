stop_conditions:
  - 工作树出现不属于 IOT-T057 允许路径的改动。
  - goal/lock 不一致，且无法在不放宽安全边界的情况下重签。
  - Python 3.11 环境或 .tmp/agent-venv/bin/python 不可复现。
  - 需要修改 schema、tools、workflow 或 review record 才能继续。
  - 需要把任何内容写成 VERIFIED、HUMAN_APPROVED 或伪造 HUMAN actor 才能通过。
  - content inventory、trust graph、strict build 或 Markdown link/fence 检查出现无法在允许路径内修复的失败。
  - 需要写入 API key、token、账号密钥或本机私密路径才能继续。
  - 远端 Repository quality 或 Pages deploy 连续失败，且失败原因不在本轮允许修复范围内。
  - 预算耗尽或 review_after 到达 2026-07-15。
