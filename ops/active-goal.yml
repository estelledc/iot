stop_conditions:
  - origin/main 不再精确指向 90de00ae421b29fa3e7231a5958e9a594fe328b3，或出现与 IOT-T063 冲突的开放 PR。
  - 工作树出现 ops/active-goal.yml 与 ops/active-goal.lock.json 之外的改动。
  - 远端 IOT-T063 或 closeout 分支存在非快进冲突，普通 push 无法完成。
  - PR 无法以普通 merge commit 合并，或必须 squash、rebase、force push、直接 push main 才能继续。
  - 任一 Repository quality 或 Pages deploy 失败，且无法仅通过重跑或允许范围内的 goal 状态修复。
  - 需要修改 IOT-T063 实现、workflow、policy、测试、文档、内容、frontmatter、schema、source/review/trust 数据或 VERSION。
  - active-goal、workflow policy、inventory 或 trust projection 出现无法在允许范围内修复的失败。
  - GitHub/SSH 凭证不可用，或必须落盘 token、密钥、本机路径才能继续。
  - 预算耗尽或 review_after 到达 2026-07-17。
