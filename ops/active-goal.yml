  task_id: IOT-T047
  mode: PROGRESSION_CONTRACT_HARDENING
  first_batch_articles: 0
  max_articles: 0
activated_by: "explicit-user-request-2026-07-13-iot-t047-bootstrap"
review_after: "2026-07-20"
budget:
  max_batches: 3
  max_articles: 0
  max_commits: 4
  max_wall_minutes: 180
  max_parallel_agents: 2
  max_parallel_writers: 1
external_outcome:
  definition: >-
    在不修改正文、frontmatter、inventory、source audit、review record、trust ledger、
    VERSION 或发布配置的前提下，为后续 IOT-T048/IOT-T049 建立可锁定、可验证的
    progression contract 底座。最终外部结果以唯一 Draft PR 当前 SHA 的
    Repository quality 成功和 ready for review 状态为准。
  d_axis: D1
  satisfies_when:
    - active-goal 生命周期通用检查与 STRUCTURAL_SHADOW_AUDIT 专用检查完成分层。
    - PREPARED 到 ACTIVE 的 commit、push、open_pr 权限必须由显式 grant 锁定。
    - tests.test_active_goal 的临时 Git 仓库清理竞态有复现证据并被最小修复。
    - source_records=29、review_records=0、legacy_unbound=642、verified=0、approved=0 保持不变。
    - Draft PR 创建后，当前 SHA 的 Repository quality 远端 CI 成功。
external_action_authority:
  commit: true
  push: true
  open_pr: true
  merge: false
  deploy: false
external_action_grant:
  source: "current-user-prompt-2026-07-13"
  granted_at: "2026-07-13T02:23:40Z"
  scope: >-
    仅限 IOT-T047 progression-contract hardening：允许从 origin/main 创建 codex feature
    branch、修改本 contract 列出的推进方式文件、原子 commit、push 分支并创建或更新唯一
    Draft PR；不允许 merge、deploy、force-push、rebase、squash 或扩大到正文和信任记录。
stop_conditions:
  - 工作树出现不属于 IOT-T047 允许路径的改动。
  - goal/lock 不一致，且无法在不放宽安全边界的情况下重签。
  - Python 3.11 环境或 .tmp/agent-venv/bin/python 不可复现。
  - 必须修改正文、frontmatter、inventory、source audit、review record、trust ledger、VERSION 或 workflow 才能继续。
  - 需要伪造作者、来源、FACT_AUDITOR、真人 reviewer、approver 或提升 VERIFIED/HUMAN_APPROVED。
  - 同一 detector fingerprint 连续两次修复失败。
  - 连续 3 个 agent 批次没有 external delta。
  - 当前 PR 仅等待人工 review 或 merge。
  - 预算耗尽或 review_after 到达 2026-07-20。
superseded_by: null
