schema_version: "1.0"
goal_id: IOT-T047
status: ACTIVE
objective: >-
  泛化 active-goal checker，使推进合同可安全承接不同 goal mode；同时修复
  PREPARED 到 ACTIVE 的外部权限生命周期矛盾，以及 tests.test_active_goal 中
  可复现的临时 Git 仓库清理竞态。
