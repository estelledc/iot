acceptance_checks:
  - id: active_goal_contract
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_active_goal.py
    expectation: ACTIVE_GOAL_OK goal_id=IOT-T064 during delivery and status=COMPLETE after closeout.
  - id: workflow_policy
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_workflow_policy.py
    expectation: IOT-T063 active-goal workflow gate remains valid and unchanged.
  - id: content_inventory
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/content_inventory.py --check
    expectation: canonical_content=697 and plan_topics=1761 remain current.
  - id: trust_projection
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_trust_state.py --all --baseline-mode
    expectation: source_records=1287 review_records=1284 verified=642 approved=642.
  - id: required_ancestor
    cadence: EVERY_SLICE
    command: git merge-base --is-ancestor 90de00ae421b29fa3e7231a5958e9a594fe328b3 HEAD
    expectation: every delivery and closeout commit preserves the required main ancestor.
  - id: delivery_branch_exact
    cadence: EVERY_SLICE
    command: test "$(git ls-remote git@github.com:estelledc/iot.git refs/heads/codex/iot-t063-active-goal-ci-gate | awk '{print $1}')" = "22943f3196401726c4eae968689e1022b4a236e2"
    expectation: the remote delivery branch remains pinned to the reviewed IOT-T064 delivery contract commit.
  - id: delivery_pr_checks
    cadence: EVERY_SLICE
    command: gh pr checks --repo estelledc/iot --required
    expectation: all checks attached to the open delivery or closeout PR succeed.
  - id: main_delivery
    cadence: GOAL_CLOSE
    command: git merge-base --is-ancestor 52391bfe8b4a8fc60c7c2ff115d5e8a3c230968f origin/main
    expectation: final origin/main contains the completed IOT-T063 implementation.
  - id: final_remote_gates
    cadence: GOAL_CLOSE
    command: gh run list --repo estelledc/iot --branch main --limit 2
    expectation: the final main SHA has successful Repository quality and Pages deploy runs.
  - id: clean_worktree
    cadence: GOAL_CLOSE
    command: test -z "$(git status --porcelain)"
    expectation: no tracked or untracked worktree changes remain.
  - id: diff_check
    cadence: EVERY_SLICE
    command: git diff --check
    expectation: no whitespace errors.
