acceptance_checks:
  - id: active_goal_contract
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_active_goal.py
    expectation: ACTIVE_GOAL_OK goal_id=IOT-T049 status=ACTIVE until closing.
  - id: content_inventory
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/content_inventory.py --check
    expectation: content inventory is current and reports structural_source_audits=29 source_audited_files=0.
  - id: source_records
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_source_audits.py --all
    expectation: SOURCE_AUDITS_OK checked=29.
  - id: review_records
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_review_records.py --all
    expectation: REVIEW_RECORDS_OK checked=0.
  - id: migration_ledger
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/reconcile_legacy_review_state.py --check
    expectation: entries=642 and legacy_unbound=642.
  - id: trust_projection
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_trust_state.py --all --baseline-mode
    expectation: source_records=29 verified=0 approved=0 evidence_bound_review=0.
  - id: deploy_acceptance
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_deploy_acceptance.py --file data/deploy-acceptance.yml --target-sha b375fd8bb32b35be9ab03e08ecedd4287dec87a1
    expectation: deploy acceptance record is schema-valid and bound to the target SHA.
  - id: deploy_acceptance_tests
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python -m unittest tests.test_deploy_acceptance -v
    expectation: deploy acceptance checker tests pass.
  - id: full_tests
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python -m unittest discover -s tests -v
    expectation: full suite passes with no regression.
  - id: strict_build
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python -m mkdocs build --strict --site-dir .tmp/site-agent-goal
    expectation: strict build succeeds.
  - id: diff_check
    cadence: EVERY_SLICE
    command: git diff --check
    expectation: no whitespace errors.
