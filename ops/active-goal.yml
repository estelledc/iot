schema_version: "1.0"
goal_id: IOT-T063
status: ACTIVE
objective: >-
  将 active-goal 合同从全量 unittest 的间接覆盖提升为 CI 与 Pages workflow
  中独立、精确、fail-closed 的质量门禁。两套 workflow 必须在 Python runtime、
  hash-locked install 与 pip check 之后，并在 inventory、trust、tests 和 build
  之前各运行一次 python tools/check_active_goal.py；workflow policy 必须拒绝
  缺失、重复、换序、包装或可跳过的门禁。本目标不修改内容、frontmatter、
  schema、source/review/trust 数据或 VERSION。
