external_outcome:
  definition: >-
    在不修改正文、frontmatter、source audit record、review record、trust authority、
    trust ledger、VERSION、schema、tools 或 workflow 的前提下，把 M2 从
    PARKED_HUMAN_EVIDENCE 推进到可交接的人审准备状态。最终外部结果以 PR #26
    当前 SHA 的 Repository quality 成功、agent review comment 完成和 merge commit
    合入 main 为准；该结果不构成 human approval，也不允许发布 v0.3.0。
  d_axis: D3
  satisfies_when:
    - agent advisory review 明确标注为 agent 预审，不是 HUMAN_APPROVED。
    - human review packet 列出真人 reviewer 需要补齐的 authority、claim、source、review record 输入。
    - docs/progress.md 链接上述材料，并继续声明 M2 未完成、v0.3.0 不发布。
    - trust 基线保持 source_records=29、review_records=0、legacy_unbound=642、verified=0、approved=0。
    - 不创建 data/review-records、CLAIM_VERIFICATION、HUMAN_APPROVED、VERIFIED 或 PARTIAL 状态。
    - PR #26 ready for review 后，当前 SHA 的 Repository quality 远端 CI 成功。
    - agent review comment 明确 no findings，且不冒充 HUMAN_APPROVED。
    - 用户授权全部收口后，PR #26 只能用 merge commit 合入 main。
external_action_authority:
  commit: true
  push: true
  open_pr: true
  merge: true
  deploy: false
external_action_grant:
  source: "current-user-prompt-2026-07-13-all-authorized"
  granted_at: "2026-07-13T07:15:30Z"
  scope: >-
    仅限 IOT-T051 human review packet preparation 的 PR #26：允许从 T050 merge 后的
    origin/main 创建 codex feature branch、修改本 contract 列出的人审准备文档和
    progress 链接、原子 commit、push 分支、创建或更新唯一 PR；允许在 agent review
    no findings 且当前 head 的 Repository quality 成功后，以 merge commit 合并 PR #26。
    仍不允许 deploy、force-push、rebase、squash、修改正文/frontmatter/source
    audit/review/trust 记录、VERSION、schema、tools 或 workflow。
stop_conditions:
  - 工作树出现不属于 IOT-T051 允许路径的改动。
  - goal/lock 不一致，且无法在不放宽安全边界的情况下重签。
  - Python 3.11 环境或 .tmp/agent-venv/bin/python 不可复现。
  - 必须修改正文、frontmatter、source audit record、review record、trust authority、trust ledger、VERSION、schema、tools 或 workflow 才能继续。
  - 需要伪造作者、来源、FACT_AUDITOR、真人 reviewer、approver 或提升 PARTIAL/VERIFIED/HUMAN_APPROVED。
  - 需要把 agent advisory review 当作 human review、review record 或 approval evidence。
  - 需要宣布 M2 或 v0.3.0 完成，但仍缺真实事实核验链或人工证据。
  - 当前 PR 仅等待人工 review 或 merge。
  - 预算耗尽或 review_after 到达 2026-07-20。
