schema_version: "1.0"
goal_id: IOT-T048
status: ACTIVE
objective: >-
  将现有 29 条 current valid STRUCTURAL source audit 诚实投影到 content inventory
  及公开派生块中，同时明确结构可审计不等于事实已核验，且不得提升
  PARTIAL、VERIFIED 或 HUMAN_APPROVED 状态。
scope:
  task_id: IOT-T048
  mode: SOURCE_AUDIT_INVENTORY_PROJECTION
  first_batch_articles: 0
  max_articles: 0
activated_by: "explicit-user-request-2026-07-13-iot-campaign-t048"
review_after: "2026-07-20"
budget:
  max_batches: 3
  max_articles: 0
  max_commits: 4
  max_wall_minutes: 180
  max_parallel_agents: 2
  max_parallel_writers: 1
external_outcome:
  definition: >-
    在不修改正文、frontmatter、source audit record、review record、trust authority、
    trust ledger、VERSION、schema 或 workflow 的前提下，让 inventory 和公开派生块
    如实显示 current valid STRUCTURAL source audit 覆盖情况，并保持事实核验计数为 0。
    最终外部结果以唯一 Draft PR 当前 SHA 的 Repository quality 成功和 ready for review
    状态为准。
  d_axis: D3
  satisfies_when:
    - inventory 按 current valid STRUCTURAL source audit 投影 29 条记录，并按八层显示 5/6/3/3/3/3/3/3。
    - revoked、stale、superseded、invalid 和 fixture 记录不计入 current coverage。
    - audit 文件纳入 inventory fingerprint，source audit 变化会触发 inventory drift。
    - STRUCTURAL 只显示结构覆盖，不提升 source status 到 PARTIAL、VERIFIED 或 HUMAN_APPROVED。
    - README、ROADMAP、docs/progress 的 generated inventory 块不再声称完全 NOT_TRACKED，同时明确 factual verified=0。
    - Draft PR 创建后，当前 SHA 的 Repository quality 远端 CI 成功。
external_action_authority:
  commit: true
  push: true
  open_pr: true
  merge: false
  deploy: false
external_action_grant:
  source: "current-user-prompt-2026-07-13-iot-campaign"
  granted_at: "2026-07-13T03:57:22Z"
  scope: >-
    仅限 IOT-T048 source-audit inventory projection：允许从 T047 merge 后的
    origin/main 创建 codex feature branch、修改本 contract 列出的 inventory 与派生事实块文件、
    原子 commit、push 分支、创建或更新唯一 Draft PR，并在远端 CI 通过后标记 ready for review；
    不允许 merge、deploy、force-push、rebase、squash、修改正文/frontmatter/source audit/review/trust
    记录或提升事实核验状态。
stop_conditions:
  - 工作树出现不属于 IOT-T048 允许路径的改动。
  - goal/lock 不一致，且无法在不放宽安全边界的情况下重签。
  - Python 3.11 环境或 .tmp/agent-venv/bin/python 不可复现。
  - 必须修改正文、frontmatter、source audit record、review record、trust authority、trust ledger、VERSION、schema 或 workflow 才能继续。
  - 需要伪造作者、来源、FACT_AUDITOR、真人 reviewer、approver 或提升 VERIFIED/HUMAN_APPROVED。
  - 同一 detector fingerprint 连续两次修复失败。
  - 连续 3 个 agent 批次没有 external delta。
  - 当前 PR 仅等待人工 review 或 merge。
  - 预算耗尽或 review_after 到达 2026-07-20。
superseded_by: null
