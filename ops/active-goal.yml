schema_version: "1.0"
goal_id: IOT-T061
status: COMPLETE
objective: >-
  修复 CI / Pages workflow 的 Python 运行时双源与依赖安装假绿：让两套
  workflow 统一从 .python-version 读取版本，在 hash-locked 安装后执行
  pip check，并把这些约束纳入 fail-closed workflow policy 与回归测试。
  本目标只加固构建基建，不修改内容正文、frontmatter、trust 记录或发布版本。
scope:
  task_id: IOT-T061
  mode: PROGRESSION_CONTRACT_HARDENING
  first_batch_articles: 0
  max_articles: 0
activated_by: "current-user-prompt-2026-07-15-continue-iot-infrastructure"
review_after: "2026-07-16"
budget:
  max_batches: 2
  max_articles: 0
  max_commits: 3
  max_wall_minutes: 120
  max_parallel_agents: 1
  max_parallel_writers: 1
external_outcome:
  definition: >-
    CI 与 Pages 构建不再各自硬编码 Python 版本，依赖安装后的冲突会在进入
    trust / test / build 门禁前失败；workflow policy 能拒绝版本源漂移和缺失
    pip check。由于本轮不 push，外部结果止于本地可复现的 D2 运行证据。
  d_axis: D2
  satisfies_when:
    - .github/workflows/ci.yml 与 .github/workflows/deploy.yml 都只通过 .python-version 选择 Python。
    - 两套 workflow 在 hash-locked 依赖安装后无条件运行 python -m pip check。
    - tools/check_workflow_policy.py 会拒绝硬编码 Python、错误 version file、重复或可跳过的 setup，以及缺失或可跳过的 pip check。
    - tests.test_repository_policies.WorkflowPolicyTests 覆盖上述绕过路径，定向测试与全量测试通过。
    - active goal、workflow policy、inventory、source/review/trust、Markdown、strict build 与 git diff --check 全部通过。
    - 697 篇 canonical 内容、1287 条 source record、1284 条 review record、642 verified / 642 approved 均保持不变。
external_action_authority:
  commit: true
  push: false
  open_pr: false
  merge: false
  deploy: false
external_action_grant:
  source: "current-user-prompt-2026-07-15-continue-iot-infrastructure"
  granted_at: "2026-07-15T11:43:49Z"
  scope: >-
    仅限 IOT-T061：允许创建 codex/ 分支并为 goal/lock、workflow 基建修复和
    closeout 创建不超过 3 个原子本地提交；不允许 push、开 PR、merge、deploy，
    不允许修改内容正文、frontmatter、source/review/trust 数据、schema 或版本号。
stop_conditions:
  - 工作树出现不属于 IOT-T061 允许路径的改动。
  - goal/lock 不一致，且无法在不放宽安全边界的情况下修复。
  - Python 3.11 环境或 .tmp/agent-venv/bin/python 不可复现。
  - setup-python 不支持从 .python-version 读取版本，或必须使用可变 action ref 才能继续。
  - 需要修改 schema、trust 工具、内容正文、frontmatter、source/review/trust 数据或 VERSION 才能继续。
  - 需要弱化 hash-locked 安装、workflow fail-closed 语义或既有门禁才可通过。
  - content inventory、trust graph、全量测试或 strict build 出现无法在允许路径内修复的失败。
  - 预算耗尽或 review_after 到达 2026-07-16。
