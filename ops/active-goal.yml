acceptance_checks:
  - id: active_goal_contract
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_active_goal.py
    expectation: ACTIVE_GOAL_OK goal_id=IOT-T061 during the slice and status=COMPLETE at closeout.
  - id: workflow_policy_tests
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python -m unittest tests.test_repository_policies.WorkflowPolicyTests -v
    expectation: runtime-source and pip-check mutation tests pass for CI and Pages workflows.
  - id: workflow_policy
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_workflow_policy.py
    expectation: immutable action refs, least privilege, runtime source and dependency health checks pass.
  - id: content_inventory
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/content_inventory.py --check
    expectation: content inventory remains current with canonical_content=697 and plan_topics=1761.
  - id: trust_projection
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_trust_state.py --all --baseline-mode
    expectation: source_records=1287 review_records=1284 verified=642 approved=642.
  - id: full_tests
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python -m unittest discover -s tests -v
    expectation: the full repository suite passes.
  - id: markdown
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python tools/check_markdown_fences.py --all && .tmp/agent-venv/bin/python tools/check_markdown_links.py --all --anchors --strict
    expectation: Markdown fence, link and anchor checks pass.
  - id: strict_build
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python -m mkdocs build --strict --site-dir .tmp/site-agent-t061
    expectation: strict site build succeeds.
  - id: diff_check
    cadence: EVERY_SLICE
    command: git diff --check
    expectation: no whitespace errors.
