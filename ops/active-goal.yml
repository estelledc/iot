acceptance_checks:
  - id: active_goal_contract
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/check_active_goal.py
    expectation: ACTIVE_GOAL_OK goal_id=IOT-T054 status=ACTIVE during content/deploy slice.
  - id: content_inventory
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/content_inventory.py --check
    expectation: content inventory is current and reports content_files=697 source_audited_files=642.
  - id: layer_catalogs
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/generate_layer_catalogs.py --check
    expectation: LAYER_CATALOGS_OK layers=8.
  - id: frontmatter
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_frontmatter.py --all
    expectation: FRONTMATTER_SCHEMA_OK checked=697 schema_version=1.0.
  - id: source_records
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_source_audits.py --all
    expectation: SOURCE_AUDITS_OK checked=1284.
  - id: review_records
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_review_records.py --all
    expectation: REVIEW_RECORDS_OK checked=1284.
  - id: trust_projection
    cadence: EVERY_SLICE
    command: .tmp/agent-venv/bin/python tools/validate_trust_state.py --all --baseline-mode
    expectation: TRUST_STATE_OK canonical_content=697 source_records=1284 review_records=1284 verified=642 approved=642.
  - id: full_tests
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python -m unittest discover -s tests -v
    expectation: full suite passes with no regression.
  - id: strict_build
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python -m mkdocs build --strict --site-dir .tmp/site-agent-goal
    expectation: strict build succeeds.
  - id: markdown_fences
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python tools/check_markdown_fences.py --all
    expectation: no Markdown fence errors.
  - id: markdown_links
    cadence: GOAL_CLOSE
    command: .tmp/agent-venv/bin/python tools/check_markdown_links.py --all --anchors --strict
    expectation: no Markdown link or anchor errors.
  - id: diff_check
    cadence: EVERY_SLICE
    command: git diff --check
    expectation: no whitespace errors.
