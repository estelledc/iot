  - goal/lock 不一致，且无法在不放宽安全边界的情况下重签。
  - Python 3.11 环境或 .tmp/agent-venv/bin/python 不可复现。
  - 新增论文需要写成 PARTIAL、VERIFIED、HUMAN_APPROVED 或创建伪造 source/review record 才能通过。
  - content inventory、frontmatter、trust graph、strict build 或 Markdown link/fence 检查出现无法在允许路径内修复的失败。
  - 需要修改 AGENTS、tools、workflow、VERSION 或 trust authority 才能继续。
  - 远端 Repository quality 或 Pages deploy 连续失败，且失败原因不在本轮允许修复范围内。
  - 预算耗尽或 review_after 到达 2026-07-14。
