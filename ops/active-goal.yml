external_outcome:
  definition: >-
    CI 与 Pages workflow 都包含可由 workflow policy 独立验证的显式 active-goal
    fail-closed 门禁；缺失、重复、换序、包装或跳过该命令的 mutation 均被拒绝。
    本轮不 push，因此 external outcome 止于本地可复现的 D2 门禁证据。
  d_axis: D2
  satisfies_when:
    - .github/workflows/ci.yml 与 .github/workflows/deploy.yml 各恰好一次运行 python tools/check_active_goal.py。
    - active-goal check 位于 setup-python、hash-locked install 和 pip check 之后，并位于 inventory、trust、tests 与 build 之前。
    - active-goal check 不使用 if、continue-on-error、env、working-directory、自定义 shell 或 wrapper。
    - tools/check_workflow_policy.py 拒绝 active-goal check 的缺失、重复、换序、包装和可跳过变体。
    - WorkflowPolicyTests 先记录 RED mutation 证据，再通过最小实现转为 GREEN。
    - active goal、workflow policy、全量 unittest、inventory、catalog、frontmatter、source、review、trust、Markdown 与 strict build 门禁全部通过。
    - 697 篇 canonical 内容、1761 个 plan topics、1287 条 source record、1284 条 review record、642 verified 与 642 approved 保持不变。
