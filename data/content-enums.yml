schema_version: "1.0"

content_type:
  paper_reading: 针对一篇可明确识别目标论文的精读；必须提供 target_paper。
  survey: 围绕一个领域整理多项工作与证据边界的综述。
  tutorial: 以教学和实践为主要目标的概念或操作指南。
  comparison: 使用明确维度比较多个协议、系统或方案。
  technical_analysis: 不满足单篇论文精读定义的技术分析。
  UNKNOWN: 现有证据不足，等待人工分类；禁止从标题猜测。

difficulty:
  zero_base: 不要求技术先修。
  beginner: 需要基本编程或计算机系统常识。
  intermediate: 需要本层入门知识。
  advanced: 需要较完整的专业基础。
  frontier: 面向前沿研究，通常包含论文或标准背景。
  UNKNOWN: 无法从现有显式元信息确定。

source_status:
  UNVERIFIED: 尚未核对正文主张与一手来源。
  PARTIAL: 只完成部分来源或主张核验。
  VERIFIED: 已按来源审计规则完成核验；不能由自动迁移赋值。
  UNKNOWN: 历史状态缺失或无法判断。

review_status:
  UNREVIEWED: 尚无人工 review record。
  IN_REVIEW: 正在人工审查。
  HUMAN_APPROVED: 人工证据包通过且正文 hash 未变化。
  NEEDS_CHANGES: 人工审查发现必须修复的问题。
  UNKNOWN: 历史审阅状态无法判断。

trust_state_machine:
  schema_version: "1.0"
  frontmatter_semantics:
    source_status: DERIVED_CACHE
    review_status: DERIVED_CACHE
    evidence_authority:
      - schemas/source-audit.schema.json
      - schemas/review-record.schema.json
  active_record_transitions:
    source_status:
      UNKNOWN:
        - UNKNOWN
        - PARTIAL
        - VERIFIED
      UNVERIFIED:
        - UNVERIFIED
        - PARTIAL
        - VERIFIED
      PARTIAL:
        - PARTIAL
        - VERIFIED
      VERIFIED:
        - VERIFIED
    review_status:
      UNKNOWN:
        - IN_REVIEW
      UNREVIEWED:
        - IN_REVIEW
      IN_REVIEW:
        - NEEDS_CHANGES
        - HUMAN_APPROVED
      NEEDS_CHANGES:
        - IN_REVIEW
      HUMAN_APPROVED:
        - IN_REVIEW
  promotion_requirements:
    source_status:
      PARTIAL:
        audit_kind: CLAIM_VERIFICATION
        coverage_scope: PARTIAL
        minimum_verified_claims: 1
        minimum_uncovered_claims: 1
        maximum_blocking_issues: 0
      VERIFIED:
        audit_kind: CLAIM_VERIFICATION
        auditor_type: HUMAN
        coverage_scope: ALL_CRITICAL_CLAIMS
        all_claims_verified: true
        minimum_references_per_claim: 1
        maximum_uncovered_claims: 0
        maximum_blocking_issues: 0
      STRUCTURAL:
        maximum_source_status_effect: NO_CHANGE
    review_status:
      HUMAN_APPROVED:
        decision: APPROVE
        source_status_at_review: VERIFIED
        reviewer_type: HUMAN
        reviewer_role: APPROVER
        reviewer_must_be_independent: true
        minimum_linked_audits: 1
        all_review_checks_pass: true
        body_hash_must_match: true
  record_lifecycle:
    active: ACTIVE
    superseded: SUPERSEDED
    revoked: REVOKED
    body_hash_mismatch: STALE
  temporal_ordering:
    source_evidence: RETRIEVED_AT_LTE_AUDITED_AT
    source_revocation: AUDITED_AT_LTE_REVOKED_AT
    review_predecessor: PREDECESSOR_REVIEWED_AT_LTE_REVIEWED_AT
    linked_audit: AUDITED_AT_LTE_REVIEWED_AT
    review_revocation: REVIEWED_AT_LTE_REVOKED_AT
  production_projection_gate:
    enabled: true
    mode: FAIL_CLOSED
    on_missing_authority: KEEP_DEFAULT
    default_source_status: UNVERIFIED
    default_review_status: IN_REVIEW
    required_authorities:
      - CURRENT_BODY_HASH
      - AUTHORITATIVE_AUTHOR_ACTOR_MAPPING
      - LOCKED_CRITICAL_CLAIM_INVENTORY
      - CROSS_RECORD_REFERENCE_VALIDATION
  derived_invalidation:
    BODY_HASH_MISMATCH:
      source_record_effect: STALE
      review_record_effect: STALE
      source_status_projection: RECOMPUTE_FROM_ACTIVE_EVIDENCE
      default_source_status_projection: UNVERIFIED
      review_status_projection: RECOMPUTE_FROM_ACTIVE_EVIDENCE
      default_review_status_projection: IN_REVIEW
      preserve_history: true
    SOURCE_REFERENCE_INVALIDATED:
      source_record_effect: RECOMPUTE
      review_record_effect: STALE_IF_LINKED
      source_status_projection: RECOMPUTE_FROM_ACTIVE_EVIDENCE
      maximum_source_status_projection: PARTIAL
      review_status_projection: IN_REVIEW
      preserve_history: true
    AUDIT_REVOKED:
      source_record_effect: REVOKED
      review_record_effect: STALE_IF_LINKED
      source_status_projection: RECOMPUTE_FROM_ACTIVE_EVIDENCE
      review_status_projection: IN_REVIEW
      preserve_history: true
    REVIEW_REVOKED:
      source_record_effect: NO_CHANGE
      review_record_effect: REVOKED
      source_status_projection: NO_CHANGE
      review_status_projection: IN_REVIEW
      preserve_history: true
    RECORD_SUPERSEDED:
      source_record_effect: SUPERSEDED_IF_SOURCE_RECORD
      review_record_effect: SUPERSEDED_IF_REVIEW_RECORD
      projection_rule: EXCLUDE_SUPERSEDED_RECORD
      preserve_history: true

migration_rules:
  - 只允许从路径、文件名、H1 和显式可见元信息提取确定值。
  - 不能确认的 content_type、difficulty、reading_time、prerequisites、source_status、review_status 使用 UNKNOWN。
  - 自动迁移不得产生 VERIFIED 或 HUMAN_APPROVED。
  - id 必须与文件名 slug 一致；layer 必须与 docs/<layer>/ 路径一致。
  - schema_version 1.x 只允许向后兼容地增加可选字段；删除、改名或收紧既有字段需要新的 major schema_version 和迁移说明。
