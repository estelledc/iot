<!-- Shared Jason DS footer for home and content pages -->
<footer class="md-footer">
  {% if page.previous_page or page.next_page %}
  <div class="md-footer__inner md-grid">
    {% if page.previous_page %}
    <a href="{{ page.previous_page.url | url }}" class="md-footer__link md-footer__link--prev">
      <div class="md-footer__title">
        <span class="md-footer__direction">上一页</span>
        {{ page.previous_page.title }}
      </div>
    </a>
    {% endif %}
    {% if page.next_page %}
    <a href="{{ page.next_page.url | url }}" class="md-footer__link md-footer__link--next">
      <div class="md-footer__title">
        <span class="md-footer__direction">下一页</span>
        {{ page.next_page.title }}
      </div>
    </a>
    {% endif %}
  </div>
  {% endif %}
  <div class="md-footer-meta md-typeset">
    <div class="md-footer-meta__inner md-grid">
      <div class="jx-footer-custom">
        <div class="jx-footer-custom__colophon">
          <strong>IoT Notebook</strong>
          <span>Jason Xun · IoT Reading Station</span>
        </div>
        <nav class="jx-footer-custom__index">
          <a href="https://estelledc.github.io/">hub</a>
          <a href="https://estelledc.github.io/about/">about</a>
          <a href="https://estelledc.github.io/resume/">resume</a>
          <a href="https://github.com/estelledc/iot">github</a>
          <a href="{{ 'roadmap/' | url }}">roadmap</a>
          <a href="{{ 'progress/' | url }}">progress</a>
        </nav>
        <span class="jx-footer-custom__stamp">持续维护</span>
      </div>
    </div>
  </div>
</footer>
