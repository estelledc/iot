{% extends "main.html" %}

{% block tabs %}{{ super() }}{% endblock %}

{% block content %}
<style>
  /* Keep the primary sidebar available as Material's mobile drawer. */
  .md-sidebar--secondary { display: none !important; }
  @media screen and (min-width: 76.25em) {
    .md-sidebar--primary { display: none !important; }
  }
  .md-content__inner { max-width: none; padding: 0; }
  .md-content { margin: 0; max-width: none; }
  .md-typeset .md-content__inner > .toc,
  .md-nav--secondary { display: none !important; }

  /* ── Hero Tile ── */
  .iot-hero {
    display: grid;
    place-items: center;
    min-height: calc(72vh - 96px);
    padding: var(--jx-section-y) var(--jx-gutter);
    text-align: center;
    background: var(--jx-paper);
  }
  .iot-hero > div {
    width: min(100%, 900px);
  }
  .iot-hero__eyebrow {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-sm);
    font-weight: var(--jx-weight-heading);
    text-transform: uppercase;
    letter-spacing: var(--jx-tracking-eyebrow);
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-4);
  }
  .iot-hero h1 {
    font-family: var(--jx-font-display);
    font-size: clamp(36px, 6vw, 56px);
    font-weight: var(--jx-weight-heading);
    line-height: var(--jx-leading-tight);
    letter-spacing: 0;
    color: var(--jx-ink);
    margin: var(--jx-space-4) auto var(--jx-space-5);
    max-width: 16ch;
  }
  .iot-hero__lead {
    font-family: var(--jx-font-sans-zh);
    font-size: clamp(17px, 2.2vw, 21px);
    font-weight: 400;
    line-height: 1.6;
    color: var(--jx-ink-2);
    max-width: 680px;
    margin: 0 auto var(--jx-space-6);
  }
  .iot-hero__en {
    max-width: 720px;
    margin: calc(-1 * var(--jx-space-4)) auto var(--jx-space-6);
    color: var(--jx-ink-muted);
    font-family: var(--jx-font-sans-latin);
    font-size: var(--jx-fs-sm);
    line-height: 1.65;
  }
  .iot-hero__actions {
    display: flex;
    gap: var(--jx-space-3);
    justify-content: center;
    flex-wrap: wrap;
  }
  .iot-hero__role {
    max-width: 760px;
    margin: var(--jx-space-5) auto 0;
    padding-top: var(--jx-space-4);
    border-top: 1px solid var(--jx-rule);
    color: var(--jx-ink-muted);
    font-size: var(--jx-fs-sm);
    line-height: 1.65;
  }
  .iot-hero__role strong {
    color: var(--jx-ink);
  }

  /* ── Project proof ── */
  .iot-case {
    max-width: var(--jx-container);
    margin: 0 auto;
    padding: var(--jx-section-y) var(--jx-gutter);
  }
  .iot-case__header {
    max-width: 760px;
    margin-bottom: var(--jx-space-7);
  }
  .iot-case__header h2 {
    max-width: 18ch;
    margin: var(--jx-space-3) 0 var(--jx-space-4);
    padding: 0;
    border: 0;
    color: var(--jx-ink);
    font-family: var(--jx-font-display);
    font-size: clamp(30px, 5vw, 48px);
    line-height: var(--jx-leading-tight);
  }
  .iot-case__header > p:last-child {
    max-width: 680px;
    color: var(--jx-ink-2);
    font-size: var(--jx-fs-lg);
    line-height: 1.65;
  }
  .iot-case .jx-proof {
    color: var(--jx-ink);
  }
  .iot-case .jx-proof__summary,
  .iot-case .jx-proof__summary-en {
    margin-block: var(--jx-space-4) 0;
  }
  .iot-case .jx-proof__metric strong {
    font-variant-numeric: tabular-nums;
  }
  .iot-case .jx-proof__links a {
    color: var(--jx-ink-2);
  }
  .iot-case .jx-proof code {
    white-space: normal;
  }

  /* ── Stats strip ── */
  .iot-stats {
    display: flex;
    justify-content: center;
    gap: clamp(24px, 5vw, 64px);
    padding: var(--jx-space-6) var(--jx-gutter);
    border-top: 1px solid var(--jx-rule);
    border-bottom: 1px solid var(--jx-rule);
    background: var(--jx-surface-sunk);
  }
  .iot-stats__item {
    text-align: center;
  }
  .iot-stats__num {
    display: block;
    font-family: var(--jx-font-display);
    font-size: clamp(28px, 4vw, 44px);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    line-height: 1.1;
  }
  .iot-stats__label {
    display: block;
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-sm);
    letter-spacing: var(--jx-tracking-eyebrow);
    text-transform: uppercase;
    color: var(--jx-ink);
    margin-top: var(--jx-space-2);
  }

  /* ── Layers grid (satellites style) ── */
  .iot-layers {
    padding: var(--jx-section-y) var(--jx-gutter);
    max-width: var(--jx-container);
    margin: 0 auto;
  }
  .iot-layers__header {
    text-align: center;
    margin-bottom: var(--jx-space-7);
  }
  .iot-layers__header h2 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h2);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    margin: var(--jx-space-3) 0;
    border: none;
    padding: 0;
  }
  .iot-layers__header p {
    font-size: var(--jx-fs-body);
    color: var(--jx-ink-2);
    max-width: 600px;
    margin: 0 auto;
  }
  .iot-layers__grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: var(--jx-space-5);
  }
  .iot-layer-card {
    padding: var(--jx-space-5);
    border: 1px solid var(--jx-rule-strong);
    border-radius: var(--jx-radius-4);
    background: var(--jx-surface);
    transition: box-shadow var(--jx-duration-base) var(--jx-easing),
                border-color var(--jx-duration-base) var(--jx-easing);
    text-decoration: none !important;
    display: block;
    color: var(--jx-ink) !important;
  }
  .iot-layer-card:hover {
    border-color: var(--jx-ink);
    box-shadow: var(--jx-shadow-stack);
    text-decoration: none !important;
    color: var(--jx-ink) !important;
  }
  .iot-layer-card__eyebrow {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-xs);
    letter-spacing: var(--jx-tracking-eyebrow);
    text-transform: uppercase;
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-2);
  }
  .iot-layer-card h3 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h3);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    margin: 0 0 var(--jx-space-3);
    line-height: var(--jx-leading-tight);
    border: none;
  }
  .iot-layer-card__desc {
    font-size: var(--jx-fs-body);
    color: var(--jx-ink-2);
    line-height: var(--jx-leading-body);
    margin: 0 0 var(--jx-space-4);
  }
  .iot-layer-card__meta {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-xs);
    color: var(--jx-ink-2);
    letter-spacing: var(--jx-tracking-mono);
  }

  /* ── Canonical Markdown prose ── */
  .iot-prose {
    box-sizing: border-box;
    width: min(100%, 960px);
    margin: 0 auto;
    padding: var(--jx-space-7) var(--jx-gutter);
  }
  .iot-prose .md-typeset__scrollwrap {
    max-width: 100%;
    margin-right: 0;
    margin-left: 0;
    overflow-x: auto;
  }
  .iot-prose .md-typeset__table {
    max-width: 100%;
  }

  /* ── Bottom CTA ── */
  .iot-cta {
    text-align: center;
    padding: var(--jx-section-y) var(--jx-gutter);
    background: var(--jx-surface-sunk);
    border-top: 1px solid var(--jx-rule);
  }
  .iot-cta h2 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h2);
    color: var(--jx-ink);
    margin: 0 0 var(--jx-space-4);
    border: none;
    padding: 0;
  }
  .iot-cta p {
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-5);
    font-size: var(--jx-fs-body);
  }

  @media (max-width: 640px) {
    .iot-hero h1 { font-size: 32px; }
    .iot-hero__actions {
      align-items: stretch;
      flex-direction: column;
    }
    .iot-hero__actions .jx-action { width: 100%; }
    .iot-hero__role { text-align: left; }
    .iot-case__header { margin-bottom: var(--jx-space-5); }
    .iot-layers__grid { grid-template-columns: 1fr; }
    .iot-stats { flex-direction: column; gap: var(--jx-space-4); }
  }
</style>

{{ page.content }}
{% endblock %}
