{% extends "main.html" %}

{% block tabs %}{{ super() }}{% endblock %}

{% block content %}
<style>
  /* Keep the primary sidebar available as Material's mobile drawer. */
  .md-sidebar--secondary { display: none !important; }
  @media screen and (min-width: 76.25em) {
    .md-sidebar--primary { display: none !important; }
  }
  .md-content__inner { max-width: none; padding: 0; }
  .md-content { margin: 0; max-width: none; }
  .md-typeset .md-content__inner > .toc,
  .md-nav--secondary { display: none !important; }

  /* ── Hero Tile ── */
  .iot-hero {
    display: grid;
    grid-template-columns: minmax(0, 0.82fr) minmax(560px, 1.18fr);
    align-items: center;
    gap: clamp(var(--jx-space-7), 6vw, 92px);
    min-height: calc(100svh - 112px);
    padding: clamp(64px, 8vw, 112px) max(var(--jx-gutter), calc((100vw - var(--jx-container)) / 2));
    text-align: left;
    background:
      linear-gradient(var(--iot-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--iot-grid) 1px, transparent 1px),
      radial-gradient(circle at 82% 24%, var(--iot-glow), transparent 34rem),
      var(--jx-paper);
    background-size: 32px 32px, 32px 32px, auto, auto;
  }
  .iot-hero__copy {
    min-width: 0;
  }
  .iot-hero__eyebrow {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-sm);
    font-weight: var(--jx-weight-heading);
    text-transform: uppercase;
    letter-spacing: var(--jx-tracking-eyebrow);
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-4);
  }
  .iot-hero h1 {
    font-family: var(--jx-font-display);
    font-size: clamp(36px, 6vw, 56px);
    font-weight: var(--jx-weight-heading);
    line-height: var(--jx-leading-tight);
    letter-spacing: 0;
    color: var(--jx-ink);
    margin: var(--jx-space-4) 0 var(--jx-space-5);
    max-width: 12ch;
  }
  .iot-hero__lead {
    font-family: var(--jx-font-sans-zh);
    font-size: clamp(17px, 2.2vw, 21px);
    font-weight: 400;
    line-height: 1.6;
    color: var(--jx-ink-2);
    max-width: 620px;
    margin: 0 0 var(--jx-space-6);
  }
  .iot-hero__en {
    max-width: 620px;
    margin: calc(-1 * var(--jx-space-4)) 0 var(--jx-space-6);
    color: var(--jx-ink-muted);
    font-family: var(--jx-font-sans-latin);
    font-size: var(--jx-fs-sm);
    line-height: 1.65;
  }
  .iot-hero__actions {
    display: flex;
    gap: var(--jx-space-3);
    justify-content: flex-start;
    flex-wrap: wrap;
  }
  .iot-hero__role {
    max-width: 620px;
    margin: var(--jx-space-5) 0 0;
    padding-top: var(--jx-space-4);
    border-top: 1px solid var(--jx-rule);
    color: var(--jx-ink-muted);
    font-size: var(--jx-fs-sm);
    line-height: 1.65;
  }
  .iot-hero__role strong {
    color: var(--jx-ink);
  }
  .iot-hero__status {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--jx-space-2) var(--jx-space-4);
    color: var(--jx-ink-muted);
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-micro);
    letter-spacing: var(--jx-tracking-mono);
  }
  .iot-hero__status b { color: var(--jx-ink); }

  /* ── Explorable eight-layer dependency lab ── */
  .iot-stack-lab {
    min-width: 0;
    overflow: hidden;
    color: var(--iot-console-ink);
    background: var(--iot-console);
    border: 1px solid var(--iot-console-line);
    border-radius: var(--jx-radius-5);
    box-shadow: var(--jx-shadow-stack);
  }
  .iot-stack-lab__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--jx-space-4);
    min-height: 68px;
    padding: var(--jx-space-3) var(--jx-space-5);
    border-bottom: 1px solid var(--iot-console-line);
  }
  .iot-stack-lab__head div { display: grid; gap: 2px; }
  .iot-stack-lab__head span,
  .iot-stack-lab__truth {
    color: var(--iot-console-muted);
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-micro);
    letter-spacing: var(--jx-tracking-eyebrow);
  }
  .iot-stack-lab__head strong {
    color: var(--iot-console-ink);
    font-size: var(--jx-fs-sm);
  }
  .iot-stack-lab__truth { color: var(--iot-console-good); white-space: nowrap; }
  .iot-stack-map {
    margin: 0;
    padding: var(--jx-space-3) var(--jx-space-4);
    list-style: none;
    counter-reset: layer;
  }
  .iot-stack-map li { position: relative; margin: 0; }
  .iot-stack-map li + li::before {
    content: "";
    position: absolute;
    inset: -7px auto auto 18px;
    height: 14px;
    border-inline-start: 1px solid var(--iot-console-line-strong);
  }
  .iot-stack-map a {
    display: grid;
    grid-template-columns: 42px minmax(92px, 0.7fr) minmax(150px, 1.35fr) auto auto;
    gap: var(--jx-space-3);
    align-items: center;
    min-height: 54px;
    padding: var(--jx-space-2) var(--jx-space-3);
    color: inherit !important;
    border: 1px solid transparent;
    border-radius: var(--jx-radius-2);
    text-decoration: none !important;
  }
  .iot-stack-map a:hover,
  .iot-stack-map a:focus-visible {
    color: var(--iot-console-ink) !important;
    background: var(--iot-console-hover);
    border-color: var(--iot-console-line-strong);
  }
  .iot-stack-map__id {
    color: var(--iot-console-signal);
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-xs);
    font-weight: var(--jx-weight-heading);
  }
  .iot-stack-map strong { font-size: var(--jx-fs-sm); }
  .iot-stack-map small {
    color: var(--iot-console-muted);
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-micro);
  }
  .iot-stack-map em,
  .iot-stack-map b {
    padding: 3px 7px;
    border-radius: var(--jx-radius-pill);
    font-family: var(--jx-font-mono);
    font-size: 9px;
    font-style: normal;
    font-weight: var(--jx-weight-heading);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .iot-stack-map em { color: var(--iot-console-good); background: var(--iot-console-good-bg); }
  .iot-stack-map b { color: var(--iot-console-warn); background: var(--iot-console-warn-bg); }
  .iot-stack-lab__legend {
    display: flex;
    flex-wrap: wrap;
    gap: var(--jx-space-2) var(--jx-space-4);
    align-items: center;
    padding: var(--jx-space-3) var(--jx-space-5);
    color: var(--iot-console-muted);
    border-top: 1px solid var(--iot-console-line);
    font-size: var(--jx-fs-micro);
  }
  .iot-stack-lab__legend span { display: inline-flex; align-items: center; gap: 7px; }
  .iot-stack-lab__legend i { width: 7px; height: 7px; border-radius: 50%; }
  .iot-stack-lab__legend i[data-state="review"] { background: var(--iot-console-good); }
  .iot-stack-lab__legend i[data-state="source"] { background: var(--iot-console-warn); }
  .iot-stack-lab__legend a { margin-inline-start: auto; color: var(--iot-console-signal); }

  /* ── Project proof ── */
  .iot-case {
    max-width: var(--jx-container);
    margin: 0 auto;
    padding: var(--jx-section-y) var(--jx-gutter);
  }
  .iot-case__header {
    max-width: 760px;
    margin-bottom: var(--jx-space-7);
  }
  .iot-case__header h2 {
    max-width: 18ch;
    margin: var(--jx-space-3) 0 var(--jx-space-4);
    padding: 0;
    border: 0;
    color: var(--jx-ink);
    font-family: var(--jx-font-display);
    font-size: clamp(30px, 5vw, 48px);
    line-height: var(--jx-leading-tight);
  }
  .iot-case__header > p:last-child {
    max-width: 680px;
    color: var(--jx-ink-2);
    font-size: var(--jx-fs-lg);
    line-height: 1.65;
  }
  .iot-case .jx-proof {
    color: var(--jx-ink);
  }
  .iot-case .jx-proof__summary,
  .iot-case .jx-proof__summary-en {
    margin-block: var(--jx-space-4) 0;
  }
  .iot-case .jx-proof__metric strong {
    font-variant-numeric: tabular-nums;
  }
  .iot-case .jx-proof__links a {
    color: var(--jx-ink-2);
  }
  .iot-case .jx-proof code {
    white-space: normal;
  }

  /* ── Stats strip ── */
  .iot-stats {
    display: flex;
    justify-content: center;
    gap: clamp(24px, 5vw, 64px);
    padding: var(--jx-space-6) var(--jx-gutter);
    border-top: 1px solid var(--jx-rule);
    border-bottom: 1px solid var(--jx-rule);
    background: var(--jx-surface-sunk);
  }
  .iot-stats__item {
    text-align: center;
  }
  .iot-stats__num {
    display: block;
    font-family: var(--jx-font-display);
    font-size: clamp(28px, 4vw, 44px);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    line-height: 1.1;
  }
  .iot-stats__label {
    display: block;
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-sm);
    letter-spacing: var(--jx-tracking-eyebrow);
    text-transform: uppercase;
    color: var(--jx-ink);
    margin-top: var(--jx-space-2);
  }

  /* ── Layers grid (satellites style) ── */
  .iot-layers {
    padding: var(--jx-section-y) var(--jx-gutter);
    max-width: var(--jx-container);
    margin: 0 auto;
  }
  .iot-layers__header {
    text-align: center;
    margin-bottom: var(--jx-space-7);
  }
  .iot-layers__header h2 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h2);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    margin: var(--jx-space-3) 0;
    border: none;
    padding: 0;
  }
  .iot-layers__header p {
    font-size: var(--jx-fs-body);
    color: var(--jx-ink-2);
    max-width: 600px;
    margin: 0 auto;
  }
  .iot-layers__grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: var(--jx-space-5);
  }
  .iot-layer-card {
    padding: var(--jx-space-5);
    border: 1px solid var(--jx-rule-strong);
    border-radius: var(--jx-radius-4);
    background: var(--jx-surface);
    transition: box-shadow var(--jx-duration-base) var(--jx-easing),
                border-color var(--jx-duration-base) var(--jx-easing);
    text-decoration: none !important;
    display: block;
    color: var(--jx-ink) !important;
  }
  .iot-layer-card:hover {
    border-color: var(--jx-ink);
    box-shadow: var(--jx-shadow-stack);
    text-decoration: none !important;
    color: var(--jx-ink) !important;
  }
  .iot-layer-card__eyebrow {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-xs);
    letter-spacing: var(--jx-tracking-eyebrow);
    text-transform: uppercase;
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-2);
  }
  .iot-layer-card h3 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h3);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    margin: 0 0 var(--jx-space-3);
    line-height: var(--jx-leading-tight);
    border: none;
  }
  .iot-layer-card__desc {
    font-size: var(--jx-fs-body);
    color: var(--jx-ink-2);
    line-height: var(--jx-leading-body);
    margin: 0 0 var(--jx-space-4);
  }
  .iot-layer-card__meta {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-xs);
    color: var(--jx-ink-2);
    letter-spacing: var(--jx-tracking-mono);
  }

  /* ── Canonical Markdown prose ── */
  .iot-prose {
    box-sizing: border-box;
    width: min(100%, 960px);
    margin: 0 auto;
    padding: var(--jx-space-7) var(--jx-gutter);
  }
  .iot-prose .md-typeset__scrollwrap {
    max-width: 100%;
    margin-right: 0;
    margin-left: 0;
    overflow-x: auto;
  }
  .iot-prose .md-typeset__table {
    max-width: 100%;
  }

  /* ── Bottom CTA ── */
  .iot-cta {
    text-align: center;
    padding: var(--jx-section-y) var(--jx-gutter);
    background: var(--jx-surface-sunk);
    border-top: 1px solid var(--jx-rule);
  }
  .iot-cta h2 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h2);
    color: var(--jx-ink);
    margin: 0 0 var(--jx-space-4);
    border: none;
    padding: 0;
  }
  .iot-cta p {
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-5);
    font-size: var(--jx-fs-body);
  }

  @media (max-width: 1100px) {
    .iot-hero {
      grid-template-columns: 1fr;
      min-height: auto;
    }
    .iot-hero h1 { max-width: 15ch; }
    .iot-stack-lab { max-width: 760px; }
  }

  @media (max-width: 700px) {
    .iot-stack-map a {
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: var(--jx-space-2);
    }
    .iot-stack-map small { grid-column: 2 / -1; }
    .iot-stack-map b { grid-column: 3; grid-row: 2; }
    .iot-stack-map em { grid-column: 3; grid-row: 1; }
  }

  @media (max-width: 640px) {
    .iot-hero h1 { font-size: 32px; }
    .iot-hero__actions {
      align-items: stretch;
      flex-direction: column;
    }
    .iot-hero__actions .jx-action { width: 100%; }
    .iot-hero__role { text-align: left; }
    .iot-case__header { margin-bottom: var(--jx-space-5); }
    .iot-layers__grid { grid-template-columns: 1fr; }
    .iot-stats { flex-direction: column; gap: var(--jx-space-4); }
    .iot-stack-lab__head { align-items: flex-start; flex-direction: column; padding-block: var(--jx-space-4); }
    .iot-stack-map { padding-inline: var(--jx-space-2); }
    .iot-stack-map a { padding-inline: var(--jx-space-2); }
    .iot-stack-lab__legend { align-items: flex-start; flex-direction: column; }
    .iot-stack-lab__legend a { margin-inline-start: 0; }
  }
</style>

{{ page.content }}
{% endblock %}
