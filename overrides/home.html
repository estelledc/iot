{% extends "main.html" %}

{% block tabs %}{{ super() }}{% endblock %}

{% block content %}
<style>
  /* Hide default content/sidebar/toc on home */
  .md-sidebar { display: none !important; }
  .md-content__inner { max-width: none; padding: 0; }
  .md-content { margin: 0; max-width: none; }
  .md-typeset .md-content__inner > .toc,
  .md-nav--secondary { display: none !important; }

  /* ── Hero Tile ── */
  .iot-hero {
    display: grid;
    place-items: center;
    min-height: calc(80vh - 120px);
    padding: var(--jx-section-y) var(--jx-gutter);
    text-align: center;
    background: var(--jx-paper);
  }
  .iot-hero__eyebrow {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-sm);
    font-weight: var(--jx-weight-heading);
    text-transform: uppercase;
    letter-spacing: var(--jx-tracking-eyebrow);
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-4);
  }
  .iot-hero h1 {
    font-family: var(--jx-font-display);
    font-size: clamp(36px, 6vw, 56px);
    font-weight: var(--jx-weight-heading);
    line-height: var(--jx-leading-tight);
    letter-spacing: 0;
    color: var(--jx-ink);
    margin: 0 0 var(--jx-space-5);
    max-width: 16ch;
  }
  .iot-hero__lead {
    font-family: var(--jx-font-sans-zh);
    font-size: clamp(17px, 2.2vw, 21px);
    font-weight: 400;
    line-height: 1.6;
    color: var(--jx-ink-2);
    max-width: 680px;
    margin: 0 auto var(--jx-space-6);
  }
  .iot-hero__actions {
    display: flex;
    gap: var(--jx-space-3);
    justify-content: center;
    flex-wrap: wrap;
  }
  .iot-pill {
    display: inline-flex;
    min-height: 44px;
    align-items: center;
    justify-content: center;
    padding: 11px 24px;
    color: var(--jx-pill-fg) !important;
    background: var(--jx-pill-bg) !important;
    border: 1.5px solid var(--jx-pill-border);
    border-radius: var(--jx-radius-pill);
    font-family: var(--jx-font-sans-zh);
    font-size: 16px;
    font-weight: 500;
    line-height: 1;
    text-decoration: none !important;
    transition: transform var(--jx-duration-fast) var(--jx-easing),
                opacity var(--jx-duration-fast) var(--jx-easing);
  }
  .iot-pill:hover {
    transform: scale(0.97);
    opacity: 0.82;
    color: var(--jx-pill-fg) !important;
    text-decoration: none !important;
  }
  .iot-pill--secondary {
    color: var(--jx-pill-secondary-fg) !important;
    background: transparent !important;
    border: 1.5px solid var(--jx-pill-secondary-border);
  }
  .iot-pill--secondary:hover {
    color: var(--jx-pill-secondary-fg) !important;
    background: var(--jx-pill-secondary-hover-bg) !important;
    opacity: 1;
  }

  /* ── Stats strip ── */
  .iot-stats {
    display: flex;
    justify-content: center;
    gap: clamp(24px, 5vw, 64px);
    padding: var(--jx-space-6) var(--jx-gutter);
    border-top: 1px solid var(--jx-rule);
    border-bottom: 1px solid var(--jx-rule);
    background: var(--jx-surface-sunk);
  }
  .iot-stats__item {
    text-align: center;
  }
  .iot-stats__num {
    display: block;
    font-family: var(--jx-font-display);
    font-size: clamp(28px, 4vw, 44px);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    line-height: 1.1;
  }
  .iot-stats__label {
    display: block;
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-sm);
    letter-spacing: var(--jx-tracking-eyebrow);
    text-transform: uppercase;
    color: var(--jx-ink);
    margin-top: var(--jx-space-2);
  }

  /* ── Layers grid (satellites style) ── */
  .iot-layers {
    padding: var(--jx-section-y) var(--jx-gutter);
    max-width: var(--jx-container);
    margin: 0 auto;
  }
  .iot-layers__header {
    text-align: center;
    margin-bottom: var(--jx-space-7);
  }
  .iot-layers__header h2 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h2);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    margin: var(--jx-space-3) 0;
    border: none;
    padding: 0;
  }
  .iot-layers__header p {
    font-size: var(--jx-fs-body);
    color: var(--jx-ink-2);
    max-width: 600px;
    margin: 0 auto;
  }
  .iot-layers__grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: var(--jx-space-5);
  }
  .iot-layer-card {
    padding: var(--jx-space-5);
    border: 1px solid var(--jx-rule-strong);
    border-radius: var(--jx-radius-4);
    background: var(--jx-surface);
    transition: box-shadow var(--jx-duration-base) var(--jx-easing),
                border-color var(--jx-duration-base) var(--jx-easing);
    text-decoration: none !important;
    display: block;
    color: var(--jx-ink) !important;
  }
  .iot-layer-card:hover {
    border-color: var(--jx-ink);
    box-shadow: var(--jx-shadow-stack);
    text-decoration: none !important;
    color: var(--jx-ink) !important;
  }
  .iot-layer-card__eyebrow {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-xs);
    letter-spacing: var(--jx-tracking-eyebrow);
    text-transform: uppercase;
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-2);
  }
  .iot-layer-card h3 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h3);
    font-weight: var(--jx-weight-heading);
    color: var(--jx-ink);
    margin: 0 0 var(--jx-space-3);
    line-height: var(--jx-leading-tight);
    border: none;
  }
  .iot-layer-card__desc {
    font-size: var(--jx-fs-body);
    color: var(--jx-ink-2);
    line-height: var(--jx-leading-body);
    margin: 0 0 var(--jx-space-4);
  }
  .iot-layer-card__meta {
    font-family: var(--jx-font-mono);
    font-size: var(--jx-fs-xs);
    color: var(--jx-ink-2);
    letter-spacing: var(--jx-tracking-mono);
  }

  /* ── Canonical Markdown prose ── */
  .iot-prose {
    box-sizing: border-box;
    width: min(100%, 960px);
    margin: 0 auto;
    padding: var(--jx-space-7) var(--jx-gutter);
  }
  .iot-prose .md-typeset__scrollwrap {
    max-width: 100%;
    margin-right: 0;
    margin-left: 0;
    overflow-x: auto;
  }
  .iot-prose .md-typeset__table {
    max-width: 100%;
  }

  /* ── Bottom CTA ── */
  .iot-cta {
    text-align: center;
    padding: var(--jx-section-y) var(--jx-gutter);
    background: var(--jx-surface-sunk);
    border-top: 1px solid var(--jx-rule);
  }
  .iot-cta h2 {
    font-family: var(--jx-font-display);
    font-size: var(--jx-fs-h2);
    color: var(--jx-ink);
    margin: 0 0 var(--jx-space-4);
    border: none;
    padding: 0;
  }
  .iot-cta p {
    color: var(--jx-ink-2);
    margin-bottom: var(--jx-space-5);
    font-size: var(--jx-fs-body);
  }

  @media (max-width: 640px) {
    .iot-hero h1 { font-size: 32px; }
    .iot-layers__grid { grid-template-columns: 1fr; }
    .iot-stats { flex-direction: column; gap: var(--jx-space-4); }
  }
</style>

{{ page.content }}
{% endblock %}
