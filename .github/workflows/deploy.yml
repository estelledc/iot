name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - run: python -m pip install --require-hashes -r requirements.lock
      - name: Verify generated inventory
        run: |
          python tools/content_inventory.py --check
          python tools/generate_layer_catalogs.py --check
      - name: Verify release metadata
        run: python tools/check_release_metadata.py --version-file VERSION --changelog CHANGELOG.md
      - name: Verify repository policies
        run: |
          python tools/check_duplicates.py
          python tools/validate_frontmatter.py --schema-only --fixtures
          python tools/validate_frontmatter.py --all
          python tools/check_workflow_policy.py
      - name: Run repository quality tests
        run: python -m unittest discover -s tests -v
      - name: Check Markdown structure and links
        run: |
          python tools/check_markdown_fences.py --all
          python tools/check_markdown_links.py --all --anchors --strict
      - name: Build site
        run: mkdocs build --strict
      - name: Validate rendered homepage
        run: |
          python tools/validate_site.py \
            --site-dir site \
            --page index.html \
            --assert-single-main \
            --assert-single-footer \
            --assert-single-h1 \
            --assert-text "物联网全栈技术学习站" \
            --assert-link "foundation/" \
            --assert-link "connectivity/" \
            --assert-link "network/" \
            --assert-link "computing/" \
            --assert-link "intelligence/" \
            --assert-link "security/" \
            --assert-link "applications/" \
            --assert-link "frontier/" \
            --assert-link "roadmap/" \
            --assert-link "progress/" \
            --external-link-rel
          python tools/validate_site.py \
            --site-dir site \
            --page foundation/index.html \
            --assert-single-main \
            --assert-single-footer \
            --assert-single-h1 \
            --external-link-rel
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
