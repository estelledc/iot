name: Repository quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: '.python-version'
      - name: Install documentation dependencies
        run: python -m pip install --require-hashes -r requirements.lock
      - name: Verify installed dependencies
        run: python -m pip check
      - name: Validate active goal contract
        run: python tools/check_active_goal.py
      - name: Verify generated and release metadata
        run: |
          python tools/content_inventory.py --check
          python tools/generate_layer_catalogs.py --check
          python tools/check_release_metadata.py --version-file VERSION --changelog CHANGELOG.md
          python tools/check_duplicates.py
          python tools/validate_frontmatter.py --schema-only --fixtures
          python tools/validate_frontmatter.py --all
      - name: Validate source audit records
        run: python tools/validate_source_audits.py --all
      - name: Validate review records
        run: python tools/validate_review_records.py --all
      - name: Validate repository trust graph
        run: python tools/validate_trust_state.py --all --baseline-mode
      - name: Validate workflow policy
        run: python tools/check_workflow_policy.py
      - name: Run repository quality tests
        run: python -m unittest discover -s tests -v
      - name: Check Markdown structure and links
        run: |
          python tools/check_markdown_fences.py --all
          python tools/check_markdown_links.py --all --anchors --strict
      - name: Build site
        run: mkdocs build --strict --site-dir .tmp/site
      - name: Validate rendered pages
        run: |
          python tools/validate_site.py \
            --site-dir .tmp/site \
            --page index.html \
            --assert-single-main \
            --assert-single-footer \
            --assert-single-h1 \
            --assert-text "先看依赖，再选择要深入的 IoT 层" \
            --assert-text "持续维护 · Maintained" \
            --assert-text "Jason Xun 负责八层体系" \
            --assert-text "NOT_TRACKED" \
            --assert-text "全量来源审计仍为" \
            --assert-link "foundation/" \
            --assert-link "connectivity/" \
            --assert-link "network/" \
            --assert-link "computing/" \
            --assert-link "intelligence/" \
            --assert-link "security/" \
            --assert-link "applications/" \
            --assert-link "frontier/" \
            --assert-link "roadmap/" \
            --assert-link "progress/" \
            --assert-link "https://estelledc.github.io/" \
            --assert-link "https://estelledc.github.io/about/" \
            --assert-link "https://estelledc.github.io/resume/" \
            --assert-link "https://github.com/estelledc/iot" \
            --assert-canonical "https://estelledc.github.io/iot/" \
            --assert-meta "og:title" \
            --assert-meta "og:description" \
            --assert-meta "og:url" \
            --assert-meta "og:image" \
            --assert-meta "twitter:card" \
            --assert-meta "twitter:title" \
            --assert-meta "twitter:image" \
            --assert-json-ld-type "Person" \
            --assert-json-ld-type "WebSite" \
            --assert-json-ld-type "CollectionPage" \
            --external-link-rel
          python tools/validate_site.py \
            --site-dir .tmp/site \
            --page foundation/index.html \
            --assert-single-main \
            --assert-single-footer \
            --assert-single-h1 \
            --external-link-rel
          python tools/validate_site.py \
            --site-dir .tmp/site \
            --page 404.html \
            --assert-single-main \
            --assert-single-footer \
            --assert-single-h1 \
            --assert-text "这条路径不在当前 IoT 依赖图里" \
            --assert-canonical "https://estelledc.github.io/iot/404.html" \
            --assert-robots "noindex,follow" \
            --forbid-json-ld \
            --external-link-rel
